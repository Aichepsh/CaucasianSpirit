<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="Dark fabric detail">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="5"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude=".75" exponent="1.4"/>
        <feFuncG type="gamma" amplitude=".72" exponent="1.4"/>
        <feFuncB type="gamma" amplitude=".68" exponent="1.4"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="shade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#121110"/>
      <stop offset=".55" stop-color="#2a2722"/>
      <stop offset="1" stop-color="#0c0b0a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="url(#shade)"/>
  <rect width="900" height="900" filter="url(#noise)" opacity=".45"/>
